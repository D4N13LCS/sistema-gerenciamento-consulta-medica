services:
  postgres:
    image: postgres:16-alpine
    container_name: medical_postgres_test
    environment:
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical_pass
      POSTGRES_DB: medical_users
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user -d medical_users"]
      interval: 3s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: medical_mongo_test
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 3s
      timeout: 3s
      retries: 10
